services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: freelance_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - freelance_network

  db:
    image: postgres:16-alpine
    container_name: freelance_db
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - freelance_network

volumes:
  postgres_data:

networks:
  freelance_network:
    driver: bridge